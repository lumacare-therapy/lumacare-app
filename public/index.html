<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#8a2be2" />
    <meta name="description" content="LumaCare - Your daily system for mental clarity and focus" />
    <title>LumaCare - Mental Wellness</title>
    <link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#8b5cf6" />
    <link rel="icon" type="image/png" href="https://i.ibb.co/DHdnTVGs/Glowing-lotus-with-diamond-accents.png" />
    <style>
      body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif; }
      /* Mobile Responsive Fixes */
@media (max-width: 768px) {
  /* Make text more readable on mobile */
  body {
    font-size: 14px;
  }
  
  /* Adjust card padding */
  .modal-content, .card {
    padding: 20px !important;
  }
  
  /* Stack navigation on mobile */
  .nav-links {
    gap: 4px !important;
  }
  
  .nav-item {
    padding: 6px 10px !important;
    font-size: 0.8rem !important;
  }
  
  /* Hide labels on mobile, show only icons */
  .nav-label {
    display: none !important;
  }
  
  /* Make buttons easier to tap */
  button, .btn, .nav-item {
    min-height: 44px;
    min-width: 44px;
  }
  
  /* Adjust font sizes */
  h1 {
    font-size: 1.8rem !important;
  }
  
  h2 {
    font-size: 1.4rem !important;
  }
  
  /* Fix overflow issues */
  .container, .main-content {
    overflow-x: hidden;
  }
  
  /* Better spacing for touch targets */
  .quick-response, .mood-option, .technique-card {
    min-height: 48px;
  }
}

/* Small phones */
@media (max-width: 480px) {
  h1 {
    font-size: 1.5rem !important;
  }
  
  .badge {
    font-size: 0.7rem !important;
    padding: 3px 8px !important;
  }
  
  .card {
    padding: 16px !important;
  }
}

/* Prevent zoom on input focus for iOS */
@media screen and (-webkit-min-device-pixel-ratio:0) { 
  select,
  textarea,
  input {
    font-size: 16px !important;
  }
}

/* Better touch scrolling */
* {
  -webkit-overflow-scrolling: touch;
}

/* Fix 100vh issue on mobile browsers */
.min-h-screen {
  min-height: 100vh;
  min-height: -webkit-fill-available;
}

html {
  height: -webkit-fill-available;
}
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
