<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#8a2be2" />
    
    <!-- ✅ UPDATED: Title Tag -->
    <title>End Task Overwhelm for Freelancers – LumaCare</title>
    
    <!-- ✅ UPDATED: Meta Description -->
    <meta name="description" content="LumaCare helps freelancers and remote workers end task overwhelm. Priority Matrix, burnout tracking, and patterns—no login required. Start for free." />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="End Task Overwhelm for Freelancers – LumaCare" />
    <meta property="og:description" content="LumaCare helps freelancers and remote workers end task overwhelm. Priority Matrix, burnout tracking, and patterns—no login required. Start for free." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lumacare-app.vercel.app" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="End Task Overwhelm for Freelancers – LumaCare" />
    <meta name="twitter:description" content="LumaCare helps freelancers and remote workers end task overwhelm. Priority Matrix, burnout tracking, and patterns—no login required. Start for free." />
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%238A2BE2'>🧠</text></svg>">

    <style>
  /* ==================== MOBILE FIRST RESET ==================== */
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    overflow-x: hidden;
    width: 100%;
    position: relative;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-size: 16px; /* Base size, rem will scale from this */
    margin: 0;
    padding: 0;
  }

  /* ==================== MOBILE BREAKPOINTS ==================== */
  @media (max-width: 768px) {
    /* Navigation fixes */
    .nav-bar {
      margin: 8px 12px !important;
      padding: 4px 8px !important;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none; /* Hide scrollbar Firefox */
    }
    
    .nav-bar::-webkit-scrollbar {
      display: none; /* Hide scrollbar Chrome/Safari */
    }
    
    .nav-content {
      flex-wrap: nowrap !important;
      gap: 4px !important;
    }
    
    .nav-links {
      flex-wrap: nowrap !important;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    
    .nav-item {
      padding: 8px 12px !important;
      font-size: 14px !important;
      white-space: nowrap;
    }
    
    .nav-label {
      display: inline !important; /* Show labels on mobile */
      margin-left: 4px;
    }
    
    .logo-text {
      font-size: 1.2rem !important;
    }
    
    /* Main content spacing */
    .main-content {
      padding: 16px 12px !important;
    }
    
    /* Cards */
    .card, .glass-card {
      padding: 16px !important;
      margin-bottom: 16px !important;
    }
    
    /* Typography */
    h1, .page-title {
      font-size: 1.8rem !important;
      line-height: 1.3 !important;
    }
    
    h2 {
      font-size: 1.4rem !important;
    }
    
    h3 {
      font-size: 1.2rem !important;
    }
    
    /* Dashboard specific */
    .grid-2, .grid-4 {
      grid-template-columns: 1fr !important;
      gap: 12px !important;
    }
    
    .metrics-grid {
      gap: 12px !important;
    }
    
    /* Stats cards */
    .stat-card {
      padding: 16px !important;
    }
    
    .stat-value {
      font-size: 1.5rem !important;
    }
    
    /* Progress rings */
    .ring-container {
      width: 160px !important;
      height: 160px !important;
    }
    
    /* Weekly chart */
    .weekly-progress {
      overflow-x: auto;
      padding: 12px !important;
    }
    
    .chart-container {
      min-width: 600px; /* Allow horizontal scroll for chart */
    }
    
    /* Priority Matrix */
    .matrix-grid {
      grid-template-columns: 1fr !important;
    }
    
    .quadrant {
      min-height: 200px !important;
    }
    
    /* Technique cards */
    .techniques-grid {
      grid-template-columns: 1fr !important;
    }
    
    /* Chat interface */
    .chat-container {
      height: calc(100vh - 180px) !important;
    }
    
    .chat-messages {
      padding: 12px !important;
    }
    
    .message {
      max-width: 85% !important;
    }
    
    .message-content {
      padding: 10px 14px !important;
      font-size: 14px !important;
    }
    
    .quick-responses {
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .quick-response {
      padding: 8px 12px !important;
      font-size: 13px !important;
    }
    
    /* Input fields */
    input, textarea, select {
      font-size: 16px !important; /* Prevents zoom on iOS */
      padding: 12px !important;
    }
    
    /* Buttons */
    button, .btn, .nav-item {
      min-height: 44px;
      min-width: 44px;
    }
    
    /* Settings page */
    .setting-item {
      flex-direction: column;
      align-items: flex-start !important;
      gap: 12px;
    }
    
    /* Premium modal */
    .premium-modal .modal-content {
      width: 95% !important;
      padding: 20px !important;
    }
    
    /* Breathing exercise */
    .breathing-circle {
      width: 200px !important;
      height: 200px !important;
    }
    
    .breathing-circle-container {
      width: 200px !important;
      height: 200px !important;
    }
    
    .phase-text {
      font-size: 1.4rem !important;
    }
    
    .phase-count {
      font-size: 2.5rem !important;
    }
    
    /* Grounding technique */
    .grounding-steps {
      grid-template-columns: 1fr !important;
    }
    
    /* Pomodoro timer */
    .timer-display {
      font-size: 2.5rem !important;
    }
  }

  /* ==================== SMALL PHONES (under 480px) ==================== */
  @media (max-width: 480px) {
    h1, .page-title {
      font-size: 1.5rem !important;
    }
    
    .badge {
      font-size: 0.7rem !important;
      padding: 4px 8px !important;
    }
    
    .nav-item {
      padding: 6px 8px !important;
      font-size: 12px !important;
    }
    
    .nav-icon {
      font-size: 1rem !important;
    }
    
    .logo-icon {
      font-size: 1.4rem !important;
    }
    
    .logo-text {
      font-size: 1rem !important;
    }
    
    .stat-value {
      font-size: 1.3rem !important;
    }
    
    .ring-container {
      width: 140px !important;
      height: 140px !important;
    }
    
    .breathing-circle {
      width: 160px !important;
      height: 160px !important;
    }
    
    .breathing-circle-container {
      width: 160px !important;
      height: 160px !important;
    }
    
    .phase-text {
      font-size: 1.2rem !important;
    }
    
    .phase-count {
      font-size: 2rem !important;
    }
  }

  /* ==================== TABLETS ==================== */
  @media (min-width: 769px) and (max-width: 1024px) {
    .grid-4 {
      grid-template-columns: repeat(2, 1fr) !important;
    }
    
    .main-content {
      padding: 24px !important;
    }
    
    .techniques-grid {
      grid-template-columns: repeat(2, 1fr) !important;
    }
  }

  /* ==================== FIX FOR 100VH ON MOBILE ==================== */
  .vh-fix {
    height: 100vh;
    height: -webkit-fill-available;
  }

  /* ==================== TOUCH OPTIMIZATIONS ==================== */
  * {
    -webkit-tap-highlight-color: transparent;
  }

  /* Remove outline on touch */
  *:focus {
    outline: none;
  }

  /* Better scrolling */
  .scrollable {
    -webkit-overflow-scrolling: touch;
    overflow-y: auto;
  }

  /* ==================== FIX FOR IOS INPUT ZOOM ==================== */
  @supports (-webkit-touch-callout: none) {
    input, textarea, select {
      font-size: 16px !important;
    }
  }

  /* ==================== FIX FOR NOTCHED PHONES ==================== */
  @supports (padding: max(0px)) {
    .safe-area-padding {
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
    }
  }
</style>
    
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
